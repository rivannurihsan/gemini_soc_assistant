[geminianalyze-command]
syntax = geminianalyze prompt=<string> (field=<string>)? (model=<string>)? (batch=<bool>)?
shortdesc = Menganalisis log menggunakan Google Gemini/Gemma AI.
description = Mengirimkan data event ke model AI Google untuk dianalisis. Parameter wajib adalah 'prompt'. Parameter opsional meliputi 'field' (default: _raw), 'model' (override konfigurasi UI), dan 'batch' (default: true).
usage = public
example1 = index=firewall | head 10 | geminianalyze prompt="Cari indikasi port scanning" batch=true
comment1 = Menganalisis 10 baris log firewall secara kolektif untuk mencari pola port scanning.
tags = gemini, ai, soc, security, analysis