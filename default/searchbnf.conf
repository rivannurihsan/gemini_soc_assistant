[geminianalyze-command]
syntax = geminianalyze prompt=<string> (field=<string>)? (model=<string>)? (batch=<bool>)? (role=<string>)?
shortdesc = Analisis log dengan AI (Gemini/Gemma).
description = Mengirimkan log ke AI. Default: batch=false (analisis per baris). \nParameter 'role' memanggil System Instructions yang sudah dibuat di Setup.
usage = public
example1 = index=main | head 5 | geminianalyze prompt="Cari anomali" role="malware_expert"