[geminianalyze-command]
syntax      = geminianalyze prompt=<string> (field=<string>)? (model=<string>)? (batch=<bool>)? (role=<string>)?
shortdesc   = Analisis log dengan AI Gemini/Gemma — output detail, komprehensif, tanpa noise.
description = [V2] Mengirimkan log ke Google AI (Gemini/Gemma) dan mengembalikan analisis komprehensif. \
              Menggunakan 'system_instruction' native API agar output bersih tanpa echo/basa-basi. \
              Parameter 'role' memilih persona AI: soc_clean_report (default) | threat_hunter | \
              malware_analyst | executive_report | json_extractor. \
              batch=true menggabungkan semua record menjadi 1 analisis besar. \
              Output fields: gemini_analysis, gemini_analysis_length, gemini_task_sent, ai_model, ai_role.
usage       = public
example1    = index=wineventlog EventCode=4625 | head 10 | geminianalyze prompt="Identifikasi teknik brute force dan mitigasinya."
example2    = index=firewall | head 100 | geminianalyze prompt="Temukan pola serangan dominan." batch=true role="threat_hunter"
example3    = index=main | head 1 | geminianalyze prompt="Buat laporan untuk direksi." role="executive_report"
example4    = index=proxy | head 20 | geminianalyze prompt="Ekstrak semua IOC." role="json_extractor"